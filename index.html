<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopio</title>
    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
    />
</head>
<body>
    <nav class="navbar">
        <div class="nav-wrapper">
            <div class="logo-wrapper">
                <img src="Images/logo.png" alt="logo" width="50px">
                <a id="logo-text" href="index.html">Shopio</a>
            </div>
            <i class="ri-search-line search-icon"></i>
            <i class="ri-shopping-cart-line"></i>
        </div>
    </nav>
    
    <main>
        <div class="category-container"></div>

        <div class="products-container"></div>

    </main>

    <div class="product-drawer">
        <div class="drawer-upper">
            <img class="drawer-img">
            <i class="ri-close-line close-button"></i>
        </div>
        <div class="drawer-lower">
            <p></p>
            <h3></h3>
            <div class="drawer-rating">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <p></p>
            <div class="drawer-priceNcart">
                <p></p>
                <button><i class="ri-shopping-cart-line"></i>Add to Cart</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
