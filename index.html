<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopio</title>
    <link rel="stylesheet" href="style.css">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
    />
</head>
<body>
    <nav class="navbar">
        <div class="nav-wrapper">
            <div class="logo-wrapper">
                <img src="Images/logo.png" alt="logo">
                <a id="logo-text" href="index.html"><b>Shop</b>io</a>
            </div>
            <div class="right-nav">
                <i class="ri-search-line search-icon"></i>
                <i class="ri-shopping-cart-line cart-icon"></i>
            </div>
        </div>
    </nav>
    
    <main>
        <div class="category-container"></div>

        <div class="products-container"></div>
    </main>

    <div class="backdrop"></div>
    <div class="product-drawer bottom-drawer">
        <div class="drawer-upper">
            <img class="drawer-img">
            <i class="ri-close-line drawer-close"></i>
        </div>
        <div class="drawer-lower ">
            <p class="drawer-category"></p>
            <h3 class="drawer-title"></h3>
            <div class="drawer-rating">
                <span class="drawer-stars"></span>
                <span class="drawer-vote"></span>
                <span class="drawer-count"></span>
            </div>
            <p class="drawer-description"></p>
            <div class="drawer-priceNcart">
                <p class="drawer-price"></p>
                <button><i class="ri-shopping-cart-line"></i> Add to Cart</button>
            </div>
        </div>
    </div>

    <div class="sidebar bottom-drawer">
        <div class="sidebar-header">
            <p><i class="ri-shopping-cart-line"></i> Your Cart</p>
            <button><i class="ri-close-line sidebar-close"></i></button>
        </div>
        <div class="cart-products"></div>
        <div class="emptyCartDisplay">
            <div class="emptyCartIcon"><i class="ri-shopping-cart-line"></i></div>
            <p class="emptycart1">Your cart is empty</p>
            <p class="emptycart2">Browse products and add items!</p>
        </div>

        <div class="cart-footer hidden">
            <div class="subtotal">
                <span>Subtotal</span>
                <span class="subtotal-value"></span>
            </div>
            <div class="shipping">
                <span>Shipping</span>
                <span class="shipping-value"></span>
            </div>
            <div class="total">
                <span>Total</span>
                <span class="total-value"></span>
            </div>
            <div class="checkout">
                <button>Proceed to checkout <i class="ri-arrow-right-line"></i></button>
            </div>
        </div>
    </div>

    <button class="fixed-cart hidden"><i class="ri-shopping-cart-line"></i><span class="cartSize"></span></button>

    <script src="app.js"></script>
</body>
</html>
